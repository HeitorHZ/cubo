<head>
  <meta charset="UTF-8" />

  <title>Cubo Mágico 3×3 Branco - Girando Reto e Centralizado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      background: #000;
      overflow: hidden;
      perspective: 2500px;          /* Aumentado para menos distorção */
      margin: 0;
    }

    .scene {
      width: 100%;
      height: 100%;
      position: relative;
      perspective: 2000px;          /* Perspectiva maior = menos "torto" */
    }

    .cube {
      width: 420px;
      height: 420px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform-style: preserve-3d;
      transform: translate(-50%, -50%) rotateX(-25deg) rotateY(40deg);
      transition: transform 0.15s linear;  /* Um pouco mais suave */
    }

    .cubinho {
      position: absolute;
      width: 100px;
      height: 100px;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #ffffff;
      border: 2px solid #444;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.5),
                  0 0 25px rgba(0,0,0,0.8);
    }

    .front  { transform: translateZ(50px); }
    .back   { transform: rotateY(180deg) translateZ(50px); }
    .right  { transform: rotateY(90deg)  translateZ(50px); }
    .left   { transform: rotateY(-90deg) translateZ(50px); }
    .top    { transform: rotateX(90deg)  translateZ(50px); }
    .bottom { transform: rotateX(-90deg) translateZ(50px); }

    /* Posições com espaçamento (mantido igual) */
    .front-layer:nth-child(1)  { transform: translate3d(-120px, -120px,  120px); }
    .front-layer:nth-child(2)  { transform: translate3d(   0px, -120px,  120px); }
    .front-layer:nth-child(3)  { transform: translate3d( 120px, -120px,  120px); }
    .front-layer:nth-child(4)  { transform: translate3d(-120px,    0px,  120px); }
    .front-layer:nth-child(5)  { transform: translate3d(   0px,    0px,  120px); }
    .front-layer:nth-child(6)  { transform: translate3d( 120px,    0px,  120px); }
    .front-layer:nth-child(7)  { transform: translate3d(-120px,  120px,  120px); }
    .front-layer:nth-child(8)  { transform: translate3d(   0px,  120px,  120px); }
    .front-layer:nth-child(9)  { transform: translate3d( 120px,  120px,  120px); }

    .middle-layer:nth-child(10) { transform: translate3d(-120px, -120px,   0px); }
    .middle-layer:nth-child(11) { transform: translate3d(   0px, -120px,   0px); }
    .middle-layer:nth-child(12) { transform: translate3d( 120px, -120px,   0px); }
    .middle-layer:nth-child(13) { transform: translate3d(-120px,    0px,   0px); }
    .middle-layer:nth-child(14) { transform: translate3d(   0px,    0px,   0px); }
    .middle-layer:nth-child(15) { transform: translate3d( 120px,    0px,   0px); }
    .middle-layer:nth-child(16) { transform: translate3d(-120px,  120px,   0px); }
    .middle-layer:nth-child(17) { transform: translate3d(   0px,  120px,   0px); }
    .middle-layer:nth-child(18) { transform: translate3d( 120px,  120px,   0px); }

    .back-layer:nth-child(19) { transform: translate3d(-120px, -120px, -120px); }
    .back-layer:nth-child(20) { transform: translate3d(   0px, -120px, -120px); }
    .back-layer:nth-child(21) { transform: translate3d( 120px, -120px, -120px); }
    .back-layer:nth-child(22) { transform: translate3d(-120px,    0px, -120px); }
    .back-layer:nth-child(23) { transform: translate3d(   0px,    0px, -120px); }
    .back-layer:nth-child(24) { transform: translate3d( 120px,    0px, -120px); }
    .back-layer:nth-child(25) { transform: translate3d(-120px,  120px, -120px); }
    .back-layer:nth-child(26) { transform: translate3d(   0px,  120px, -120px); }
    .back-layer:nth-child(27) { transform: translate3d( 120px,  120px, -120px); }
  </style>
</head>
